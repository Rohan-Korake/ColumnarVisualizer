<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="assets/favicon.svg" type="image/x-icon" />
    <title>ColumnarVisualizer</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <header>
      <div class="name">Columnar<span class="name-part">Visualizer</span></div>
    </header>
    <main>
      <div class="content">
        <div class="input-section">
          <input
            type="text"
            class="textBox"
            placeholder="Input Text"
            required
            id="inputText"
          />

          <input
            type="number"
            min="1"
            class="numberBox"
            id="levelCount"
            required
            placeholder="column"
          />

          <select
            class="operation-selector"
            name="encryption"
            id="operation"
            required
          >
            <option value="">Select Method</option>
            <option value="encryption">Encryption</option>
            <option value="decryption">Decryption</option>
          </select>

          <button class="run-button" type="submit" id="runButton">
            Process
          </button>
        </div>
        <div class="output-section">
          <div class="output-field" id="outputText">Output Text</div>
          <div class="output-field" id="outputText">Random Order</div>

          <div class="visualization-container" id="visualizationBox">
            <div class="error" id="errorMessage"></div>
            <div class="ouput-screen" id="visualOutput">
              Waiting for input....
            </div>
            <div class="box-container" id="boxContainer">
              <!-- <div class="box">R</div>
              <div class="box">R</div>
              <div class="box">R</div>
              <div class="box">R</div>
              <div class="box">R</div>
              <div class="box">R</div> -->
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Social links  -->
    <footer>
      <div class="social-links">
        <a
          href="https://www.linkedin.com/in/rohan-korake-720848342/"
          target="_blank"
        >
          <i class="fab fa-linkedin"></i>
        </a>
        <a href="https://github.com/Rohan-Korake" target="_blank">
          <i class="fab fa-github"></i>
        </a>
        <a href="mailto:rohannkorake@gmail.com" target="_blank">
          <i class="fas fa-envelope"></i>
        </a>
      </div>
    </footer>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
